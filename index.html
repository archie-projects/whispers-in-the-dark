<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Whispers in the Dark</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="fog"></div>

  <header>
    <h1 class="title">Whispers in the Dark</h1>
    <div class="controls">
      <button class="nav-btn" onclick="prevChapter()">[ &laquo; PREV ]</button>

      <select id="fontSelector" class="nav-select" onchange="changeFont()" title="Choose Reading Font">
        <option value="'Crimson Text', serif">Crimson Text (Default)</option>
        <option value="'Playfair Display', serif">Playfair Display (Elegant)</option>
        <option value="'Merriweather', serif">Merriweather (Classic)</option>
        <option value="'Lora', serif">Lora (Literary)</option>
        <option value="'Montserrat', sans-serif">Montserrat (Modern)</option>
        <option value="'Roboto', sans-serif">Roboto (Clean)</option>
        <option value="'Courier New', Courier, monospace">Courier New (Typewriter)</option>
        <option value="Georgia, serif">Georgia (Traditional)</option>
        <option value="'Times New Roman', Times, serif">Times New Roman (Formal)</option>
        <option value="Arial, sans-serif">Arial (Basic)</option>
      </select>

      <button class="nav-btn" id="speedToggle" onclick="toggleSpeed()">[ SPEED: NORMAL ]</button>

      <button class="nav-btn" id="themeToggle" onclick="toggleTheme()">[ DARK MODE ]</button>

      <span id="chapterIndicator"></span>
      <button class="nav-btn" onclick="nextChapter()">[ NEXT &raquo; ]</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <h3>Archives</h3>
      <ul id="chapterList"></ul>

      <div class="copyright">
        &copy; 2026 Whispers in the Dark.<br>All rights reserved.
      </div>
    </div>

    <div class="reader">
      <h2 id="chapterTitle"></h2>
      <div id="progressBar"></div>
      <div id="chapterContent"></div>
    </div>
  </div>

  <button id="musicToggle" class="floating-audio" title="Drag to move, Click to toggle audio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <g class="mute-cross">
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </g>
      <path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07 M19.07 4.93a10 10 0 0 1 0 14.14"></path>
    </svg>
  </button>

  <audio id="music" src="music/music_1.mp3"></audio>

  <script src="chapters.js"></script>
  <script src="script.js"></script>
</body>

</html>
