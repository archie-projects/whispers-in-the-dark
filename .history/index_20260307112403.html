<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Whispers in the Dark</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="fog"></div>

  <header>
    <h1 class="title">Whispers in the Dark</h1>
    <div class="controls">
      <button class="nav-btn" onclick="prevChapter()">[ &laquo; PREV ]</button>
      <span id="chapterIndicator"></span>
      <button class="nav-btn" onclick="nextChapter()">[ NEXT &raquo; ]</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <h3>Archives</h3>
      <ul id="chapterList"></ul>
    </div>

    <div class="reader">
      <h2 id="chapterTitle"></h2>
      <div id="progressBar"></div>
      <div id="chapterContent"></div>
    </div>
  </div>

  <button id="musicToggle" class="floating-audio" title="Toggle Audio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>

      <g class="mute-cross">
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </g>

      <path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07 M19.07 4.93a10 10 0 0 1 0 14.14"></path>
    </svg>
  </button>

  <audio id="music" src="music/music_1.mp3"></audio>

  <script src="chapters.js"></script>
  <script src="script.js"></script>
</body>

</html>
